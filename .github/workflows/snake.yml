name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322C55E&color_dots=%23CBD5E1,%2314532D,%2316A34A,%2322C55E,%23BBF7D0
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=%23CBD5E1,%23BBF7D0,%2386EFAC,%2322C55E,%2315803D
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Paint SVG canvas white
        run: |
          sudo chown -R "$(id -u):$(id -g)" dist

          node <<'NODE'
          const fs = require('fs');
          // Goal: outside grid + gaps = white, empty cells = gray (set by URL color_dots[0])
          // Strategy: make every background / gap CSS variable white, leave cell colors untouched

          for (const file of fs.readdirSync('dist').filter((name) => name.endsWith('.svg'))) {
            const path = `dist/${file}`;
            let svg = fs.readFileSync(path, 'utf8');

            // ── CSS-level fixes (controls gaps + edges via snk variables) ──
            // --cb = canvas background (visible through cell gaps)
            svg = svg.replace(/--cb:#[0-9a-fA-F]{3,8}/gi, '--cb:#FFFFFF');
            svg = svg.replace(/--ce:#[0-9a-fA-F]{3,8}/gi, '--ce:#FFFFFF');
            // Some dark palettes also set --ca (alternate background)
            svg = svg.replace(/--ca:#[0-9a-fA-F]{3,8}/gi, '--ca:#FFFFFF');

            // ── Inline-level fix (fallback: the first background <rect>) ──
            // snk v3 renders a full-viewport <rect> as the canvas; turn it white.
            // Only touch rects whose fill is a literal hex (not var(--c*)) to avoid cells.
            svg = svg.replace(
              /(<rect\b(?!.*?\bfill="var\(--c))[^>]*?\bfill=")(#[0-9a-fA-F]{3,8})(")/gi,
              '$1#FFFFFF$3'
            );

            fs.writeFileSync(path, svg);
          }
          NODE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
