name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322C55E&color_dots=%23E5E7EB,%2314532D,%2316A34A,%2322C55E,%23BBF7D0
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=%23E5E7EB,%23BBF7D0,%2386EFAC,%2322C55E,%2315803D
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Paint SVG background gray
        run: |
          node <<'NODE'
          const fs = require('fs');
          for (const file of fs.readdirSync('dist').filter((name) => name.endsWith('.svg'))) {
            const path = `dist/${file}`;
            const svg = fs.readFileSync(path, 'utf8');
            if (svg.includes('data-profile-bg="soft-gray"')) continue;
            fs.writeFileSync(
              path,
              svg.replace(
                /(<svg\b[^>]*>)/,
                '$1<rect data-profile-bg="soft-gray" x="-100%" y="-100%" width="300%" height="300%" fill="#E5E7EB"/>'
              )
            );
          }
          NODE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
