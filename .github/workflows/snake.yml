name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=F59E0B&color_dots=0B1220,123040,155E75,0891B2,22D3EE
            dist/github-contribution-grid-snake.svg?color_snake=F59E0B&color_dots=EBEDF0,BFDBFE,67E8F9,22D3EE,0891B2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
