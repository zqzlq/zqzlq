name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322C55E&color_dots=%23CBD5E1,%2314532D,%2316A34A,%2322C55E,%23BBF7D0
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=%23CBD5E1,%23BBF7D0,%2386EFAC,%2322C55E,%2315803D
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Paint SVG canvas white
        run: |
          sudo chown -R "$(id -u):$(id -g)" dist

          node <<'NODE'
          const fs = require('fs');
          const canvas = '#FFFFFF';
          const emptyCell = '#CBD5E1';

          for (const file of fs.readdirSync('dist').filter((name) => name.endsWith('.svg'))) {
            const path = `dist/${file}`;
            const svg = fs.readFileSync(path, 'utf8');
            const cleanSvg = svg.replace(/<rect data-profile-bg="[^"]+"[^>]*\/>/, '');
            const viewBox = cleanSvg.match(/viewBox="([^"]+)"/)?.[1]?.trim().split(/\s+/).map(Number);
            const [x, y, width, height] = viewBox?.length === 4 ? viewBox : [0, 0, 880, 192];

            fs.writeFileSync(
              path,
              cleanSvg
                .replace(
                  /(<svg\b[^>]*>)/,
                  `$1<rect data-profile-bg="white-canvas" x="${x}" y="${y}" width="${width}" height="${height}" fill="${canvas}"/>`
                )
                .replace(/--cb:#[0-9a-fA-F]{6,8}/, `--cb:${canvas}`)
                .replace(/--ce:#[0-9a-fA-F]{6,8}/, `--ce:${emptyCell}`)
                .replace(/--c0:#[0-9a-fA-F]{6,8}/, `--c0:${emptyCell}`)
            );
          }
          NODE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
