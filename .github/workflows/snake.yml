name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322C55E&color_dots=%23CBD5E1,%2314532D,%2316A34A,%2322C55E,%23BBF7D0
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=%23CBD5E1,%23BBF7D0,%2386EFAC,%2322C55E,%2315803D
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Paint SVG canvas white
        run: |
          sudo chown -R "$(id -u):$(id -g)" dist

          node <<'NODE'
          const fs = require('fs');
          // Snk v3 uses CSS custom properties in a <style> block.
          // --cb = canvas background (visible through cell gaps)
          // --ce = outer edge padding
          // --ca = alternate background (some palettes)
          // Cell colors (--c0..--c4) are set by URL color_dots param, left untouched.

          for (const file of fs.readdirSync('dist').filter(function (n) { return n.endsWith('.svg'); })) {
            const path = 'dist/' + file;
            var svg = fs.readFileSync(path, 'utf8');

            // Turn every background / gap variable white.
            svg = svg.replace(/--cb:#[0-9a-fA-F]{3,8}/gi, '--cb:#FFFFFF');
            svg = svg.replace(/--ce:#[0-9a-fA-F]{3,8}/gi, '--ce:#FFFFFF');
            svg = svg.replace(/--ca:#[0-9a-fA-F]{3,8}/gi, '--ca:#FFFFFF');

            fs.writeFileSync(path, svg);
          }
          NODE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
