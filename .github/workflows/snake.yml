name: Feed Contribution Snake

on:
  schedule:
    # GitHub may delay scheduled jobs, but this keeps the profile feeling alive.
    - cron: "17 */4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-profile.svg?color_snake=%2322C55E&color_dots=%23CBD5E1,%2386EFAC,%234ADE80,%2322C55E,%2316A34A
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2322C55E&color_dots=%23CBD5E1,%2386EFAC,%234ADE80,%2322C55E,%2316A34A
            dist/github-contribution-grid-snake.svg?color_snake=%2316A34A&color_dots=%23CBD5E1,%23BBF7D0,%2386EFAC,%2322C55E,%2315803D
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize snake SVG colors
        run: |
          sudo chown -R "$(id -u):$(id -g)" dist

          node <<'NODE'
          const fs = require('fs');

          const canvas = '#FFFFFF';
          const snake = '#22C55E';
          const emptyCell = '#CBD5E1';
          const levels = ['#CBD5E1', '#86EFAC', '#4ADE80', '#22C55E', '#16A34A'];

          for (const file of fs.readdirSync('dist').filter((name) => name.endsWith('.svg'))) {
            const path = `dist/${file}`;
            let svg = fs.readFileSync(path, 'utf8');
            const viewBox = svg.match(/viewBox="([^"]+)"/)?.[1]?.trim().split(/\s+/).map(Number);
            const box = viewBox && viewBox.length === 4 ? viewBox : [0, 0, 880, 192];
            const background = `<rect data-profile-bg="white-canvas" x="${box[0]}" y="${box[1]}" width="${box[2]}" height="${box[3]}" fill="${canvas}"/>`;

            svg = svg.replace(/<rect data-profile-bg="[^"]+"[^>]*\/>/g, '');
            svg = svg.replace(/(<svg\b[^>]*>)/, `$1${background}`);
            svg = svg.replace(/--cb:\s*#[0-9a-fA-F]{3,8}/gi, `--cb:${canvas}`);
            svg = svg.replace(/--cs:\s*#[0-9a-fA-F]{3,8}/gi, `--cs:${snake}`);
            svg = svg.replace(/--ce:\s*#[0-9a-fA-F]{3,8}/gi, `--ce:${emptyCell}`);

            for (let i = 0; i < levels.length; i++) {
              svg = svg.replace(new RegExp(`--c${i}:\\s*#[0-9a-fA-F]{3,8}`, 'gi'), `--c${i}:${levels[i]}`);
            }

            fs.writeFileSync(path, svg);
          }
          NODE

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
